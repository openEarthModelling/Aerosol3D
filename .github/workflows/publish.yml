name: Publish to PyPI

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          python -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = rf'## \\[{re.escape(sys.argv[1])}\\].*?(?=## \\[|$)'
          match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(0).strip()
              notes = re.sub(r'^## \\[[^\\]]+\\].*?\\n', '', notes).strip()
              print(notes)
          else:
              print('No changelog entry found for version', sys.argv[1])
              sys.exit(1)
          " "$VERSION" > release_notes.md
          gh release edit "$TAG" --notes-file release_notes.md --repo ${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
